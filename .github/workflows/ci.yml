name: Forensics Platform CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-env: '3.10'
        cache: 'pip'

    - name: Install Linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy

    - name: Check Code Formatting (Black)
      run: black --check app/ ai_engine/

    - name: Check Import Order (isort)
      run: isort --check-only app/ ai_engine/

    - name: Static Lint Verification (Flake8)
      run: flake8 app/ ai_engine/ --max-line-length=120 --ignore=E203,W503

  unit-testing:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx

    - name: Run Pytest Suites
      run: |
        pytest tests/ --cov=app --cov-report=xml

  docker-build-test:
    runs-on: ubuntu-latest
    needs: unit-testing
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker Container
      run: |
        docker build -t forensics-api:latest -f Dockerfile .
